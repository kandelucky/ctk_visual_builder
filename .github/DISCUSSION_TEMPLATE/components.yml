title: "[component] "
labels: ["component"]
body:
  - type: markdown
    attributes:
      value: |
        Share a `.ctkcomp` component for the CTkMaker Hub.

        **Name, category, description, and license live inside the
        `.ctkcomp` file itself** — set them in CTkMaker's "Publish to
        Community" dialog before exporting. You don't need to fill
        anything in here. Just drag your files below.

        **Help picking a category?** See the
        [Component Categories guide](https://github.com/kandelucky/ctk_maker/wiki/Component-Categories).

        After you submit, your component appears on the
        [CTkMaker Hub site](https://kandelucky.github.io/ctkMaker-component-library/)
        within ~30 minutes.

  - type: textarea
    id: files
    attributes:
      label: Files
      description: |
        Drag your `.ctkcomp` and a screenshot `.png` directly into
        this box. GitHub uploads them and replaces the drag with a
        link automatically.
      value: |
        Drop the .ctkcomp and the screenshot .png below this line,
        then delete this hint:

    validations:
      required: true

  - type: textarea
    id: notes
    attributes:
      label: Notes (optional)
      description: |
        Anything worth flagging — context, version it was tested
        against, known limitations. Leave blank if there's nothing
        to add.
    validations:
      required: false
